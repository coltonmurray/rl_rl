env:
  action_repeat: 8
  spawn_opponents: true
  team_size: 1
  no_touch_timeout_seconds: 30
  game_timeout_seconds: 300

reward_weights:
  goal: 10.0
  touch: 0.1

wandb:
  enabled: true
  project: rl_rl
  entity:
  group:
  mode: online
  tags: []
  dir: outputs/wandb
  cache_dir: outputs/wandb_cache
  data_dir: outputs/wandb_data
  log_artifacts: true

ppo:
  n_proc: 4
  timesteps: 1000000
  batch_size: 50000
  minibatch_size: 25000
  policy_lr: 0.00005
  critic_lr: 0.00005
  ent_coef: 0.01
  epochs: 1
  hidden_sizes: [256, 256]

rollouts:
  episodes: 20
  max_steps: 2000
  policy: heuristic
  output_path: outputs/rollouts.npz
  policy_checkpoint: outputs/policy.pt

world_model:
  hidden_size: 256
  hidden_layers: 2
  learning_rate: 0.001
  batch_size: 512
  epochs: 20
  validation_fraction: 0.1
  checkpoint_path: outputs/world_model.pt

planning:
  horizon: 5
  candidate_sequences: 64
  discount: 0.99
  execute_episodes: 10
  max_steps: 1000
  policy: heuristic
